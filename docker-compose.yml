services:
  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_SITE_URL: http://120.26.45.50
    restart: unless-stopped
    # Next.js reads .env.local on the host only when running next dev/start directly.
    # Inside Docker, secrets must be injected into the container (env_file below).
    env_file:
      - path: .env
        required: false
      - path: .env.local
        required: false
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      CHAT_STORE_PROVIDER: redis
      REDIS_URL: redis://redis:6379
      CHAT_MESSAGE_TTL_SECONDS: 21600
    expose:
      - "3000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  web:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy

